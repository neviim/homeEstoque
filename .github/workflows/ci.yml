name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs anteriores no mesmo branch — economiza minutos do GitHub
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: go build
        working-directory: backend
        run: go build ./...

      - name: go test (race + coverage)
        working-directory: backend
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        working-directory: backend
        run: go tool cover -func=coverage.out | tail -1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  frontend:
    name: Frontend Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

  e2e:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend] # só roda se as unit suites passaram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Frontend deps
        working-directory: frontend
        run: npm ci

      - name: E2E deps
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        env:
          # playwright.config.ts sobrescreve esse path no test runner;
          # precisamos passar igual aqui para o install gravar no mesmo lugar.
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/tests/e2e/.playwright-cache
        run: npx playwright install --with-deps chromium

      - name: Build MCP binary (necessário para mcp.spec.ts)
        working-directory: backend
        run: go build -o ../bin/homeestoque-mcp ./cmd/mcp

      - name: Run E2E
        working-directory: tests/e2e
        env:
          CI: "true"
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/tests/e2e/.playwright-cache
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 14
