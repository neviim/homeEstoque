server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Limite de upload de fotos (padrão nginx é 1MB)
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # SPA — qualquer rota desconhecida serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy da API REST
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Fotos enviadas pelos itens
    location /uploads/ {
        proxy_pass         http://api:8080;
        proxy_set_header   Host $host;
    }

    # Health check do backend (útil para monitoramento externo)
    location /health {
        proxy_pass   http://api:8080;
        access_log   off;
    }

    # Segurança: ocultar versão do nginx
    server_tokens off;
}
